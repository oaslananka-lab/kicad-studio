name: Bug Report
description: Report a reproducible KiCad Studio bug
labels: ['type:bug', 'needs:triage']
body:
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable reproduction.
      placeholder: |
        1. Open a workspace containing ...
        2. Run command ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: KiCad Studio version
      placeholder: '2.7.7'
    validations:
      required: true
  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      placeholder: '1.99.0'
    validations:
      required: true
  - type: input
    id: kicad-version
    attributes:
      label: KiCad / kicad-cli version
      placeholder: 'KiCad 10.0.x, KiCad 9.x, or not installed'
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: 'Windows 11, macOS 15, Ubuntu 24.04, ...'
    validations:
      required: true
  - type: dropdown
    id: workspace-trust
    attributes:
      label: Workspace Trust state
      options:
        - Trusted
        - Restricted
        - Not sure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Include redacted logs, screenshots, or the Output panel text when useful.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Viewer
        - KiCad CLI / exports
        - DRC / ERC
        - MCP / AI integration
        - Packaging / install
        - CI / repository automation
        - Documentation
        - Other
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Expected fix risk
      options:
        - risk:low
        - risk:medium
        - risk:high
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: automation
    attributes:
      label: May a coding agent work on this?
      description: Security, release, publishing, and secret work still requires maintainer review.
      options:
        - Yes, if maintainers label it agent:candidate
        - No, human maintainer only
        - Not sure
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Done criteria
      description: What would prove this issue is fixed?
