name: 'Pull Request Size Labeler'
on: [pull_request]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-size-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  triage:
    if: github.repository == 'oaslananka-lab/kicad-studio'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: pascalgn/size-label-action@56b489b027932ec0cf60438a1a5f1a19c8fc71ff
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
