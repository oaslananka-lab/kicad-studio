name: Publish Manual Fallback

on:
  workflow_dispatch:

jobs:
  package-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:prod
      - run: npm run package
      - name: Azure DevOps notice
        run: echo "Marketplace publishing is handled from Azure DevOps with manual approval. This GitHub workflow only produces a fallback VSIX package."
      - uses: actions/upload-artifact@v4
        with:
          name: kicadstudio-vsix-manual
          path: "*.vsix"
