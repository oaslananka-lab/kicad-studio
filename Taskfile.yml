version: '3'

tasks:
  install:
    desc: Deterministic dependency install
    cmds:
      - npm ci

  format:check:
    desc: Check formatting without writing
    cmds:
      - npm run format:check

  format:fix:
    desc: Auto-fix formatting
    cmds:
      - npm run format

  lint:
    desc: ESLint + format check
    cmds:
      - task: format:check
      - npm run lint

  typecheck:
    desc: TypeScript type-check
    cmds:
      - npm run typecheck

  check:manifest:
    desc: Validate VS Code extension package metadata
    cmds:
      - npm run check:manifest

  check:workspace-trust:
    desc: Validate restricted workspace capability metadata
    cmds:
      - npm run check:workspace-trust

  test:unit:
    desc: Run unit tests
    cmds:
      - npm run test:unit

  test:unit:coverage:
    desc: Run unit tests with coverage
    cmds:
      - npm run test:unit:coverage

  build:
    desc: Production webpack build
    cmds:
      - npm run build

  package:
    desc: Package the VSIX
    cmds:
      - npm run package

  package:ls:
    desc: Inspect packaged VSIX file list
    cmds:
      - npm run package:ls

  security:ci:
    desc: CI-safe security checks (npm audit only)
    cmds:
      - npm run audit:ci

  security:local:
    desc: Heavy local security checks (requires gitleaks, osv-scanner, trivy, actionlint, zizmor)
    cmds:
      - cmd: bash scripts/local-security.sh
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/local-security.ps1
        platforms: [windows]

  pre-push:
    desc: Fast local pre-push gate
    cmds:
      - task: lint
      - task: typecheck
      - task: check:manifest
      - task: check:workspace-trust
      - task: test:unit
      - task: security:ci

  ci:
    desc: Full CI pipeline (mirrors GitHub Actions)
    cmds:
      - task: lint
      - task: typecheck
      - task: check:manifest
      - task: check:workspace-trust
      - task: test:unit:coverage
      - task: build
      - task: package
      - task: package:ls
      - npm run check:bundle-size
      - task: security:ci

  doppler:check:
    desc: Verify required release secret names exist in Doppler
    cmds:
      - cmd: bash scripts/verify_doppler_secrets.sh
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/verify_doppler_secrets.ps1
        platforms: [windows]

  hooks:
    desc: Install git hooks (run once after clone)
    cmds:
      - npx husky install
